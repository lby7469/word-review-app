<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单词记忆与复习</title>
  <style>
    :root {
      --bg: #f4efe7;
      --bg-accent: #dfece7;
      --card: rgba(255, 255, 255, 0.8);
      --card-strong: #fffdf8;
      --muted: #61706b;
      --text: #22302e;
      --text-soft: #445451;
      --border: rgba(111, 138, 131, 0.2);
      --soft: #edf4f0;
      --soft-strong: #e3ece7;
      --warn-bg: #fff0d8;
      --warn-text: #9a5d00;
      --danger: #c2483d;
      --danger-bg: #ffe6e0;
      --primary: #0f766e;
      --primary-strong: #155e75;
      --primary-text: #ffffff;
      --shadow: 0 24px 60px rgba(54, 74, 67, 0.12);
      --shadow-soft: 0 14px 34px rgba(54, 74, 67, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "MiSans", "HarmonyOS Sans SC", "Source Han Sans SC",
        "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      background-image:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 26%),
        radial-gradient(circle at top right, rgba(255, 214, 153, 0.44), transparent 22%),
        linear-gradient(180deg, #fbf8f2 0%, #f6f1e9 18%, var(--bg) 45%, #ece9df 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.34), rgba(255,255,255,0.18)),
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 42px,
          rgba(111, 138, 131, 0.04) 42px,
          rgba(111, 138, 131, 0.04) 43px
        );
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.45), transparent 78%);
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 22px 48px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 20px;
      margin-bottom: 22px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.72);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .title {
      font-size: 38px;
      line-height: 1.06;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 12px;
    }

    .desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      max-width: 56ch;
    }

    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 10px 15px;
      background: rgba(255,255,255,0.68);
      font-size: 13px;
      color: var(--text-soft);
      border: 1px solid rgba(111, 138, 131, 0.18);
      box-shadow: 0 10px 24px rgba(38, 52, 47, 0.08);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .stat-box {
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(242,247,243,0.86));
      padding: 16px;
      border: 1px solid rgba(111, 138, 131, 0.16);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    .stat-box::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, rgba(255,255,255,0.12), rgba(255,255,255,0));
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .stats .stat-box:nth-child(1) .stat-value { color: #0f766e; }
    .stats .stat-box:nth-child(1)::before { background: linear-gradient(90deg, #0f766e, #5eead4); }
    .stats .stat-box:nth-child(2) .stat-value { color: #155e75; }
    .stats .stat-box:nth-child(2)::before { background: linear-gradient(90deg, #155e75, #67e8f9); }
    .stats .stat-box:nth-child(3) .stat-value { color: #b45309; }
    .stats .stat-box:nth-child(3)::before { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .stats .stat-box:nth-child(4) .stat-value { color: #b45309; }
    .stats .stat-box:nth-child(4)::before { background: linear-gradient(90deg, #b45309, #fdba74); }

    .section-title {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .btn {
      border: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: var(--primary-text);
      padding: 12px 18px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(29, 78, 216, 0.22);
      transition: transform .12s ease, opacity .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .btn:hover {
      opacity: .98;
      box-shadow: 0 16px 28px rgba(29, 78, 216, 0.28);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-outline {
      background: rgba(255,255,255,0.82);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.24);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, var(--danger));
      color: #fff;
      box-shadow: 0 12px 24px rgba(220, 38, 38, 0.22);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(16px);
      padding: 8px;
      border-radius: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.82);
      position: sticky;
      top: 16px;
      z-index: 10;
    }

    .tab-btn {
      border: 0;
      background: transparent;
      border-radius: 16px;
      padding: 13px;
      cursor: pointer;
      font-weight: 700;
      color: var(--muted);
      transition: background .2s ease, color .2s ease, transform .15s ease;
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(241, 245, 249, 0.9);
    }

    .tab-btn.active {
      background: linear-gradient(180deg, #ffffff, #eff8f5);
      color: #0f5f58;
      box-shadow: 0 10px 22px rgba(15, 118, 110, 0.12);
    }

    .hidden { display: none !important; }

    .empty {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      border: 2px dashed rgba(111, 138, 131, 0.24);
      background: rgba(255,255,255,0.58);
      border-radius: 28px;
      padding: 28px;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .due-card {
      display: flex;
      gap: 16px;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .due-main {
      flex: 1 1 680px;
      min-width: 0;
    }

    .due-side {
      flex: 0 0 220px;
    }

    .review-panel {
      background: linear-gradient(180deg, #fbfffd, #edf7f3);
      border-radius: 22px;
      padding: 20px;
      margin: 16px 0 14px;
      border: 1px solid rgba(15, 118, 110, 0.12);
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .meaning {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-soft);
    }

    .warn-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--warn-bg);
      color: var(--warn-text);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(245, 158, 11, 0.14);
    }

    .warn-badge.high {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: rgba(220, 38, 38, 0.16);
    }

    .lapse-text {
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--warn-text);
    }

    .lapse-text.high {
      color: var(--danger);
    }

    .pill-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      background: var(--warn-bg);
      color: var(--warn-text);
      border-radius: 18px;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid rgba(245, 158, 11, 0.14);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(255,255,255,0.9);
      border-radius: 18px;
      padding: 13px 15px;
      outline: none;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: rgba(59, 130, 246, 0.45);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      background: #fff;
    }

    .textarea {
      min-height: 150px;
      resize: vertical;
    }

    .hint-box {
      background: linear-gradient(180deg, #fbfdfc, #edf5f1);
      border-radius: 18px;
      padding: 13px 15px;
      color: var(--muted);
      font-size: 14px;
      border: 1px solid rgba(111, 138, 131, 0.14);
    }

    .error {
      color: var(--danger);
      font-size: 14px;
      margin-top: 8px;
    }

    .all-top {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .search-sort {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .word-card {
      transition: transform .18s ease, box-shadow .2s ease;
    }

    .word-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 64px rgba(28, 45, 94, 0.16);
    }

    .word-card .header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .icon-btns {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255,255,255,0.8);
      border-radius: 14px;
      padding: 8px 11px;
      cursor: pointer;
      transition: background .2s ease, transform .12s ease;
    }

    .icon-btn:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .progress-wrap {
      margin-top: 10px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress {
      height: 12px;
      background: #e5edf9;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, var(--primary));
      width: 0%;
      border-radius: inherit;
    }

    .plan-box {
      background: linear-gradient(180deg, #fbfdfc, #edf5f1);
      border-radius: 20px;
      padding: 14px;
      border: 1px solid rgba(111, 138, 131, 0.14);
    }

    .plan-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.88);
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 14px;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .status {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: var(--soft);
    }

    .status.done {
      background: #dff2ec;
      color: #0f766e;
    }

    .status.due {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: #fecaca;
    }

    .status.future {
      background: var(--soft);
      color: var(--muted);
    }

    .footer-due {
      background: var(--warn-bg);
      color: var(--warn-text);
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid rgba(245, 158, 11, 0.14);
    }

    .inline-group {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .inline-group .input {
      flex: 1;
    }

    .hero-card {
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.16), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,0.94), rgba(238,247,242,0.78));
    }

    .hero-card .row-between,
    .hero-card .stats {
      position: relative;
      z-index: 1;
    }

    .hero-card::before,
    .side-card::before,
    .surface-panel::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.6), rgba(255,255,255,0));
      top: -110px;
      right: -80px;
      pointer-events: none;
    }

    .side-card {
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,242,234,0.82));
    }

    .tab-shell {
      display: grid;
      gap: 18px;
    }

    .surface-panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,244,237,0.8));
    }

    .empty-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .empty-text {
      max-width: 34ch;
      line-height: 1.8;
    }

    .empty-copy {
      max-width: 34ch;
    }

    .empty-copy > div:first-child {
      font-size: 22px !important;
      font-weight: 800 !important;
      color: var(--text) !important;
      margin-bottom: 10px !important;
      letter-spacing: -0.02em;
    }

    .empty-copy > div + div {
      line-height: 1.8;
    }

    .due-card {
      align-items: stretch;
      gap: 20px;
    }

    .due-side {
      display: flex;
      align-items: flex-start;
    }

    .due-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .due-word {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .review-prompt {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0f766e;
    }

    .review-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .review-panel > .muted:first-child {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0f766e;
    }

    .due-meta {
      display: grid;
      gap: 8px;
    }

    .pill-list {
      gap: 10px;
    }

    .pill-list .pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      background: linear-gradient(180deg, #fff7e8, #fff0d8);
    }

    .due-step-btn {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 12px;
    }

    .word-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(247,244,238,0.84));
    }

    .word-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .word-title {
      font-size: 24px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .word-meta,
    .word-note {
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
    }

    .word-meaning {
      color: var(--text-soft);
      font-weight: 600;
    }

    .plan-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .plan-box > div:first-child {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .search-sort .input,
    .search-sort .select {
      min-height: 48px;
    }

    .compact-hint {
      padding: 12px 14px;
    }

    .account-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(111, 138, 131, 0.16);
      display: grid;
      gap: 12px;
    }

    .account-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .account-value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .focus-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .focus-copy {
      flex: 1 1 320px;
    }

    .focus-kicker {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: #0f766e;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .focus-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .session-wrap {
      display: grid;
      gap: 18px;
    }

    .session-card {
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.12), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(244, 249, 246, 0.82));
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .session-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .session-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(111, 138, 131, 0.18);
      padding: 8px 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .session-progress {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .session-main {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 18px;
      padding: 20px 0 28px;
    }

    .session-word {
      font-size: clamp(42px, 8vw, 76px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.06em;
      color: var(--text);
    }

    .session-meaning {
      max-width: 720px;
      font-size: 24px;
      line-height: 1.7;
      color: var(--text-soft);
    }

    .session-note {
      max-width: 700px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.9;
      color: var(--muted);
    }

    .session-tip {
      max-width: 52ch;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.9;
      color: var(--muted);
    }

    .session-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .session-actions .btn {
      min-width: 148px;
    }

    .session-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding-top: 18px;
      border-top: 1px solid rgba(111, 138, 131, 0.14);
    }

    .session-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    @media (max-width: 980px) {
      .grid-top,
      .two-col,
      .cards-grid,
      .stats {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 32px;
      }
    }

    @media (max-width: 720px) {
      .container { padding: 16px 14px 28px; }
      .title { font-size: 24px; }
      .tabs { grid-template-columns: 1fr 1fr 1fr; }
      .due-card { flex-direction: column; }
      .due-side { flex: 1 1 auto; }
      .all-top { align-items: stretch; }
      .search-sort { width: 100%; }
      .search-sort > * { flex: 1 1 100%; }
      .inline-group { flex-direction: column; }
      .card { padding: 18px; border-radius: 24px; }
      .stat-value { font-size: 26px; }
      .tabs { top: 10px; }
      .due-word { font-size: 24px; }

      .pill-list .pill { align-items: flex-start; flex-direction: column; }
      .session-card { min-height: 460px; }
      .session-footer { align-items: stretch; }
      .session-footer > * { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid-top">
      <div class="card hero-card">
        <div class="row-between">
          <div>
            <h1 class="title">单词记忆与复习</h1>

        <div class="two-col">

                <input id="input-meaning" class="input" placeholder="输入单词后点击获取中文释义" readonly />
                <button class="btn btn-outline" id="btn-lookup">获取中文释义</button>

            <div class="desc">支持搜索、排序、查看每个单词的复习计划</div>
          </div>

          <div class="search-sort">
            <input id="input-search" class="input" placeholder="搜索单词 / 中文释义 / 备注" style="min-width:260px;" />
            <select id="select-sort" class="select" style="min-width:140px;">
              <option value="newest">最新添加</option>
              <option value="oldest">最早添加</option>
              <option value="due">优先待复习</option>
            </select>
          </div>
        </div>

        <div id="all-cards" class="cards-grid"></div>
        <div id="all-empty" class="empty hidden" style="margin-top: 4px;">
          <div class="empty-copy">
            <div style="font-size:20px; font-weight:700; color:#0f172a; margin-bottom:8px;">还没有匹配的单词</div>
            <div>你可以先新增几个单词，或者换一个搜索词。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "ebbinghaus_words_local_v1";
    const SETTINGS_KEY = "ebbinghaus_settings_v1";
    const AUTH_TOKEN_KEY = "word_review_auth_token";
    const INITIAL_TAB_KEY = "word_review_initial_tab";
    const LOGIN_PAGE_URL = "/";
    const APP_PAGE_URL = "/app";
    const REVIEW_PAGE_URL = "/app/review";
    const AUTH_ME_URL = "/api/auth/me";
    const API_STATE_URL = "/api/state";
    const DICTIONARY_API_BASE = "https://api.dictionaryapi.dev/api/v2/entries/en/";
    const TRANSLATE_API_BASE = "https://api.mymemory.translated.net/get";
    const DEFAULT_INTERVALS = [0, 1, 2, 4, 7, 15, 30];
    const REINFORCEMENT_INTERVALS = [0, 1, 2];

    const state = {
      words: [],
      settings: { intervals: DEFAULT_INTERVALS.slice() },
      currentTab: "today",
      query: "",
      sortBy: "newest",
      isFetchingMeaning: false,
      fetchError: "",
      syncError: "",
      syncStatus: "正在验证登录状态",
      backendReady: false,
      currentUser: null,
      reviewSession: {
        queue: [],
        revealed: false,
      },
      form: {
        word: "",
        meaning: "",
        note: "",
      },
      revealState: {}
    };

    function getBeijingNow() {
      const now = new Date();
      return new Date(now.toLocaleString("en-US", { timeZone: "Asia/Shanghai" }));
    }

    function formatDateCN(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatDateTimeCN(date) {
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false,
      }).format(date);
    }

    function addDays(dateStr, days) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const utc = new Date(Date.UTC(y, m - 1, d));
      utc.setUTCDate(utc.getUTCDate() + days);
      const yy = utc.getUTCFullYear();
      const mm = String(utc.getUTCMonth() + 1).padStart(2, "0");
      const dd = String(utc.getUTCDate()).padStart(2, "0");
      return `${yy}-${mm}-${dd}`;
    }

    function isDueOnOrBefore(targetDate, today) {
      return targetDate <= today;
    }

    function safeRead(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    }

    function getAuthToken() {
      return localStorage.getItem(AUTH_TOKEN_KEY) || "";
    }

    function clearAuthToken() {
      localStorage.removeItem(AUTH_TOKEN_KEY);
    }

    function redirectToLogin() {
      window.location.href = LOGIN_PAGE_URL;
    }

    function isReviewRoute() {
      return window.location.pathname.replace(/\/+$/, "") === REVIEW_PAGE_URL;
    }

    function navigateToAppHome() {
      window.location.href = APP_PAGE_URL;
    }

    function navigateToReviewPage() {
      window.location.href = REVIEW_PAGE_URL;
    }

    function navigateToAppTab(tab) {
      sessionStorage.setItem(INITIAL_TAB_KEY, tab);
      navigateToAppHome();
    }

    function consumeInitialTab() {
      const tab = sessionStorage.getItem(INITIAL_TAB_KEY);
      if (tab) {
        sessionStorage.removeItem(INITIAL_TAB_KEY);
      }
      return tab;
    }

    async function apiRequest(url, options = {}) {
      const token = getAuthToken();
      const response = await fetch(url, {
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {}),
        },
        ...options,
      });

      const contentType = response.headers.get("content-type") || "";
      const data = contentType.includes("application/json") ? await response.json().catch(() => ({})) : {};

      if (!response.ok) {
        const error = new Error(data.error || `request_failed_${response.status}`);
        error.status = response.status;
        throw error;
      }

      return data;
    }

    function handleAuthExpired() {
      state.currentUser = null;
      clearAuthToken();
      redirectToLogin();
    }

    async function loadCurrentUser() {
      if (!getAuthToken()) {
        redirectToLogin();
        return false;
      }

      try {
        const result = await apiRequest(AUTH_ME_URL);
        state.currentUser = result.user || null;
        return true;
      } catch {
        handleAuthExpired();
        return false;
      }
    }

    function persistLocalBackup() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.words));
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
    }

    async function persist() {
      persistLocalBackup();
      if (!state.backendReady) return;

      try {
        await apiRequest(API_STATE_URL, {
          method: "PUT",
          body: JSON.stringify({
            words: state.words,
            settings: state.settings,
          }),
        });
        state.syncStatus = "已同步到云端";
        state.syncError = "";
      } catch (error) {
        if (error.status === 401) {
          handleAuthExpired();
          return;
        }
        state.syncStatus = "云端同步失败，已保留本地备份";
        state.syncError = "当前无法写入服务器，数据已暂存到本地浏览器。";
      }
    }

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function buildMainPlan(learnedDate, intervals) {
      return intervals.map((dayOffset, index) => ({
        step: index + 1,
        offset: dayOffset,
        reviewDate: addDays(learnedDate, dayOffset),
        source: "main",
        label: `第 ${index + 1} 次主计划复习`,
      }));
    }

    function buildReinforcementPlan(round) {
      return round.intervals.map((dayOffset, index) => ({
        step: index + 1,
        offset: dayOffset,
        reviewDate: addDays(round.baseDate, dayOffset),
        source: "reinforcement",
        reinforcementId: round.id,
        label: `第 ${index + 1} 次强化复习`,
      }));
    }

    function getAllPlannedSteps(word) {
      const mainPending = buildMainPlan(word.learnedDate, word.intervals || DEFAULT_INTERVALS).filter(
        (item) => !(word.completedReviews || []).includes(item.step)
      );

      const reinforcementPending = (word.reinforcementRounds || []).flatMap((round) =>
        buildReinforcementPlan(round).filter((item) => !(round.completedSteps || []).includes(item.step))
      );

      return [...mainPending, ...reinforcementPending].sort((a, b) => {
        if (a.reviewDate !== b.reviewDate) return a.reviewDate.localeCompare(b.reviewDate);
        if (a.source !== b.source) return a.source === "main" ? -1 : 1;
        return a.step - b.step;
      });
    }

    function getNextPendingStep(word, today) {
      for (const item of getAllPlannedSteps(word)) {
        if (isDueOnOrBefore(item.reviewDate, today)) {
          return item;
        }
      }
      return null;
    }

    function getAllDueSteps(word, today) {
      return getAllPlannedSteps(word).filter((item) => isDueOnOrBefore(item.reviewDate, today));
    }

    function getProgress(word) {
      const mainTotal = (word.intervals || DEFAULT_INTERVALS).length;
      const mainDone = (word.completedReviews || []).length;
      const reinforcementTotal = (word.reinforcementRounds || []).reduce((sum, round) => sum + round.intervals.length, 0);
      const reinforcementDone = (word.reinforcementRounds || []).reduce((sum, round) => sum + round.completedSteps.length, 0);
      const total = mainTotal + reinforcementTotal;
      const done = mainDone + reinforcementDone;
      return {
        total,
        done,
        percent: total > 0 ? Math.round((done / total) * 100) : 0,
      };
    }

    function wordMatchesQuery(word, query) {
      const q = query.trim().toLowerCase();
      if (!q) return true;

      return [word.word, word.meaning, word.note]
        .filter(Boolean)
        .some((value) => String(value).toLowerCase().includes(q));
    }

    function extractMeaningFromDictionaryData(data) {
      if (!Array.isArray(data) || data.length === 0) return "";

      const lines = [];
      for (const entry of data) {
        for (const meaning of entry.meanings || []) {
          const partOfSpeech = meaning.partOfSpeech ? `【${meaning.partOfSpeech}】` : "";
          const definitions = (meaning.definitions || [])
            .slice(0, 2)
            .map((item) => item.definition)
            .filter(Boolean);

          if (definitions.length > 0) {
            lines.push(`${partOfSpeech}${definitions.join("；")}`);
          }
        }
      }

      return lines.slice(0, 3).join(" / ");
    }

    async function translateTextToChinese(text) {
      const cleaned = text.trim();
      if (!cleaned) return "";

      const url =
        TRANSLATE_API_BASE +
        "?q=" +
        encodeURIComponent(cleaned) +
        "&langpair=" +
        encodeURIComponent("en|zh-CN");

      const response = await fetch(url);
      if (!response.ok) {
        throw new Error("中文释义翻译失败");
      }

      const data = await response.json();
      const translated = data?.responseData?.translatedText;
      if (!translated || typeof translated !== "string") {
        throw new Error("中文释义翻译失败");
      }

      return translated.trim();
    }

    async function fetchMeaning(word) {
      const cleaned = word.trim();
      if (!cleaned) return "";

      const response = await fetch(`${DICTIONARY_API_BASE}${encodeURIComponent(cleaned)}`);
      if (!response.ok) {
        throw new Error("释义获取失败");
      }

      const data = await response.json();
      const englishMeaning = extractMeaningFromDictionaryData(data);
      if (!englishMeaning) {
        throw new Error("未查询到明确释义");
      }
      return await translateTextToChinese(englishMeaning);
    }

    function normalizeWord(raw) {
      const reinforcementRounds = Array.isArray(raw.reinforcementRounds)
        ? raw.reinforcementRounds.map((round) => ({
            id: round.id || crypto.randomUUID(),
            createdAt: round.createdAt || new Date().toISOString(),
            baseDate: round.baseDate || formatDateCN(getBeijingNow()),
            intervals: Array.isArray(round.intervals) && round.intervals.length ? round.intervals : REINFORCEMENT_INTERVALS,
            completedSteps: Array.isArray(round.completedSteps) ? round.completedSteps : [],
          }))
        : [];

      return {
        id: raw.id || crypto.randomUUID(),
        word: raw.word || "",
        meaning: raw.meaning || "",
        note: raw.note || "",
        learnedDate: raw.learnedDate || formatDateCN(getBeijingNow()),
        createdAt: raw.createdAt || new Date().toISOString(),
        intervals: Array.isArray(raw.intervals) && raw.intervals.length ? raw.intervals : DEFAULT_INTERVALS,
        completedReviews: Array.isArray(raw.completedReviews) ? raw.completedReviews : [],
        reinforcementRounds,
        lapseCount: typeof raw.lapseCount === "number" ? raw.lapseCount : reinforcementRounds.length,
      };
    }

    function runSelfChecks() {
      console.assert(addDays("2026-03-20", 1) === "2026-03-21", "addDays should add one day");
      console.assert(addDays("2026-03-31", 1) === "2026-04-01", "addDays should cross month boundary");

      const sample = normalizeWord({
        id: "t1",
        word: "abandon",
        learnedDate: "2026-03-20",
        intervals: [0, 1, 2],
        completedReviews: [1],
      });
      console.assert(getAllDueSteps(sample, "2026-03-22").length === 2, "main due steps should be counted");
      console.assert(getProgress(sample).total === 3, "getProgress should compute total steps");
      console.assert(wordMatchesQuery(sample, "aban"), "wordMatchesQuery should match word text");

      const reinforced = normalizeWord({
        id: "t2",
        word: "keep",
        learnedDate: "2026-03-20",
        intervals: [0, 1],
        reinforcementRounds: [
          { id: "r1", createdAt: "2026-03-22", baseDate: "2026-03-22", intervals: [0, 1, 2], completedSteps: [1] },
        ],
      });
      console.assert(getAllDueSteps(reinforced, "2026-03-23").length === 3, "reinforcement due steps should be included");
      console.assert(getNextPendingStep(reinforced, "2026-03-23")?.source === "main", "main plan should be prioritized on same day");
    }

    async function loadState() {
      try {
        const remote = await apiRequest(API_STATE_URL);
        state.words = (remote.words || []).map(normalizeWord);
        const settings = remote.settings || { intervals: DEFAULT_INTERVALS };
        state.settings = {
          intervals:
            Array.isArray(settings.intervals) && settings.intervals.length
              ? settings.intervals
              : DEFAULT_INTERVALS.slice(),
        };
        state.backendReady = true;
        state.syncStatus = "云端数据库已连接";
        state.syncError = "";
        persistLocalBackup();
      } catch (error) {
        if (error.status === 401) {
          handleAuthExpired();
          return;
        }
        state.words = safeRead(STORAGE_KEY, []).map(normalizeWord);
        const settings = safeRead(SETTINGS_KEY, { intervals: DEFAULT_INTERVALS });
        state.settings = {
          intervals:
            Array.isArray(settings.intervals) && settings.intervals.length
              ? settings.intervals
              : DEFAULT_INTERVALS.slice(),
        };
        state.backendReady = false;
        state.syncStatus = "未连接服务器，当前使用本地数据";
        state.syncError = "页面未连接到后端服务。部署到云服务器后，这里会自动切换到云端存储。";
      }
    }

    function todayDate() {
      return formatDateCN(getBeijingNow());
    }

    function getStats() {
      const today = todayDate();
      const dueWords = state.words.filter((word) => getAllDueSteps(word, today).length > 0);
      const totalDueSteps = state.words.reduce((sum, word) => sum + getAllDueSteps(word, today).length, 0);
      const todayLearned = state.words.filter((word) => word.learnedDate === today).length;

      return {
        totalWords: state.words.length,
        dueWords: dueWords.length,
        totalDueSteps,
        todayLearned,
      };
    }

    function getDueToday() {
      const today = todayDate();
      return state.words
        .map((word) => ({
          ...word,
          dueSteps: getAllDueSteps(word, today),
          nextPending: getNextPendingStep(word, today),
        }))
        .filter((word) => word.dueSteps.length > 0)
        .sort((a, b) => a.learnedDate.localeCompare(b.learnedDate));
    }

    function buildReviewSessionQueue() {
      return getDueToday().map((word) => word.id);
    }

    function getWordById(wordId) {
      return state.words.find((word) => word.id === wordId) || null;
    }

    function getEnrichedWord(wordId) {
      const word = getWordById(wordId);
      if (!word) return null;
      const today = todayDate();
      return {
        ...word,
        dueSteps: getAllDueSteps(word, today),
        nextPending: getNextPendingStep(word, today),
      };
    }

    function normalizeReviewSessionQueue() {
      const nextQueue = [];
      for (const wordId of state.reviewSession.queue) {
        const item = getEnrichedWord(wordId);
        if (item && item.dueSteps.length > 0) {
          nextQueue.push(wordId);
        }
      }
      state.reviewSession.queue = nextQueue;
      return nextQueue;
    }

    function getCurrentSessionWord() {
      const queue = normalizeReviewSessionQueue();
      if (!queue.length) return null;
      return getEnrichedWord(queue[0]);
    }

    function startReviewSession(reset = true) {
      if (!isReviewRoute()) {
        navigateToReviewPage();
        return;
      }
      if (reset || !state.reviewSession.queue.length) {
        state.reviewSession.queue = buildReviewSessionQueue();
      }
      state.reviewSession.revealed = false;
      state.currentTab = "session";
      render();
    }

    function finishReviewTurn(wordId) {
      const currentId = state.reviewSession.queue[0];
      if (currentId === wordId) {
        state.reviewSession.queue.shift();
      } else {
        state.reviewSession.queue = state.reviewSession.queue.filter((id, index) => !(id === wordId && index !== 0));
      }

      const updated = getEnrichedWord(wordId);
      if (updated && updated.dueSteps.length > 0) {
        state.reviewSession.queue.push(wordId);
      }
      state.reviewSession.revealed = false;
    }

    function getFilteredWords() {
      const today = todayDate();
      const result = state.words.filter((word) => wordMatchesQuery(word, state.query));

      if (state.sortBy === "newest") {
        return [...result].sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      }
      if (state.sortBy === "oldest") {
        return [...result].sort((a, b) => a.createdAt.localeCompare(b.createdAt));
      }
      if (state.sortBy === "due") {
        return [...result].sort((a, b) => getAllDueSteps(b, today).length - getAllDueSteps(a, today).length);
      }
      return result;
    }

    function getLapseMeta(lapseCount) {
      if (!lapseCount || lapseCount <= 0) {
        return {
          badgeClass: "",
          textClass: "",
        };
      }

      if (lapseCount >= 3) {
        return {
          badgeClass: "high",
          textClass: "high",
        };
      }

      return {
        badgeClass: "",
        textClass: "",
      };
    }

    function applyReviewDone(wordId, step, source = "main", reinforcementId) {
      state.words = state.words.map((word) => {
        if (word.id !== wordId) return word;

        if (source === "main") {
          const set = new Set(word.completedReviews || []);
          set.add(step);
          return { ...word, completedReviews: Array.from(set).sort((a, b) => a - b) };
        }

        return {
          ...word,
          reinforcementRounds: (word.reinforcementRounds || []).map((round) => {
            if (round.id !== reinforcementId) return round;
            const set = new Set(round.completedSteps || []);
            set.add(step);
            return { ...round, completedSteps: Array.from(set).sort((a, b) => a - b) };
          }),
        };
      });
    }

    function markReviewDone(wordId, step, source = "main", reinforcementId) {
      applyReviewDone(wordId, step, source, reinforcementId);
      void persist();
      render();
    }

    function markWordKnown(wordId) {
      const target = state.words.find((word) => word.id === wordId);
      if (!target) return;
      const next = getNextPendingStep(target, todayDate());
      if (!next) return;
      markReviewDone(wordId, next.step, next.source, next.reinforcementId);
    }

    function applyWordUnknown(wordId) {
      const today = todayDate();
      state.words = state.words.map((word) => {
        if (word.id !== wordId) return word;
        return {
          ...word,
          learnedDate: today,
          intervals: state.settings.intervals.slice(),
          completedReviews: [],
          reinforcementRounds: [],
          lapseCount: (word.lapseCount || 0) + 1,
        };
      });
    }

    function markWordUnknown(wordId) {
      applyWordUnknown(wordId);
      void persist();
      render();
    }

    function revealSessionMeaning() {
      const current = getCurrentSessionWord();
      if (!current) return;
      state.reviewSession.revealed = true;
      render();
    }

    function answerSessionKnown() {
      const current = getCurrentSessionWord();
      if (!current || !current.nextPending) return;
      applyReviewDone(current.id, current.nextPending.step, current.nextPending.source, current.nextPending.reinforcementId);
      finishReviewTurn(current.id);
      void persist();
      render();
    }

    function answerSessionUnknown() {
      const current = getCurrentSessionWord();
      if (!current) return;
      applyWordUnknown(current.id);
      finishReviewTurn(current.id);
      void persist();
      render();
    }

    function markAllDueDone(wordId) {
      const today = todayDate();

      state.words = state.words.map((word) => {
        if (word.id !== wordId) return word;

        const mainSet = new Set(word.completedReviews || []);
        const reinforcementMap = new Map(
          (word.reinforcementRounds || []).map((round) => [round.id, new Set(round.completedSteps || [])])
        );

        getAllDueSteps(word, today).forEach((item) => {
          if (item.source === "main") {
            mainSet.add(item.step);
          } else if (item.reinforcementId) {
            reinforcementMap.get(item.reinforcementId)?.add(item.step);
          }
        });

        return {
          ...word,
          completedReviews: Array.from(mainSet).sort((a, b) => a - b),
          reinforcementRounds: (word.reinforcementRounds || []).map((round) => ({
            ...round,
            completedSteps: Array.from(reinforcementMap.get(round.id) || []).sort((a, b) => a - b),
          })),
        };
      });

      void persist();
      render();
    }

    function resetProgress(wordId) {
      state.words = state.words.map((word) =>
        word.id === wordId
          ? { ...word, completedReviews: [], reinforcementRounds: [], lapseCount: 0 }
          : word
      );
      void persist();
      render();
    }

    function deleteWord(wordId) {
      state.words = state.words.filter((word) => word.id !== wordId);
      delete state.revealState[wordId];
      void persist();
      render();
    }

    async function handleLookupMeaning() {
      const word = state.form.word.trim();
      if (!word) return;

      state.isFetchingMeaning = true;
      state.fetchError = "";
      syncFormUI();

      try {
        const meaning = await fetchMeaning(word);
        state.form.meaning = meaning || "未查询到中文释义";
      } catch {
        state.fetchError = "自动获取中文释义失败，你仍然可以直接保存单词，并把中文释义写在备注里。";
      } finally {
        state.isFetchingMeaning = false;
        syncFormUI();
      }
    }

    async function addWord() {
      const cleanedWord = state.form.word.trim();
      if (!cleanedWord) return;

      let finalMeaning = state.form.meaning.trim();

      if (!finalMeaning) {
        state.isFetchingMeaning = true;
        state.fetchError = "";
        syncFormUI();
        try {
          finalMeaning = await fetchMeaning(cleanedWord);
        } catch {
          state.fetchError = "自动获取中文释义失败，已保存单词；你之后可以在备注里补充中文释义。";
        } finally {
          state.isFetchingMeaning = false;
          syncFormUI();
        }
      }

      const item = normalizeWord({
        id: crypto.randomUUID(),
        word: cleanedWord,
        meaning: finalMeaning || "",
        note: state.form.note.trim(),
        learnedDate: todayDate(),
        createdAt: new Date().toISOString(),
        intervals: state.settings.intervals.slice(),
        completedReviews: [],
        reinforcementRounds: [],
        lapseCount: 0,
      });

      state.words.unshift(item);
      state.form = { word: "", meaning: "", note: "" };
      void persist();
      render();
    }

    function exportData() {
      downloadJson(`word-review-backup-${todayDate()}.json`, {
        exportedAt: new Date().toISOString(),
        beijingDate: todayDate(),
        settings: state.settings,
        words: state.words,
      });
    }

    function importDataFromFile(file) {
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          if (Array.isArray(parsed.words)) {
            state.words = parsed.words.map(normalizeWord);
          }
          if (parsed.settings && Array.isArray(parsed.settings.intervals)) {
            state.settings = { intervals: parsed.settings.intervals };
          }
          void persist();
          render();
        } catch {
          alert("导入失败：文件格式不正确");
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function applyIntervalsByPrompt() {
      const current = state.settings.intervals.join(",");
      const input = window.prompt("请输入复习间隔，用英文逗号分隔，例如：0,1,2,4,7,15,30", current);
      if (input == null) return;

      const values = input
        .split(",")
        .map((part) => Number(part.trim()))
        .filter((value) => Number.isFinite(value) && value >= 0);

      if (values.length === 0) {
        alert("请输入有效的间隔天数，例如：0,1,2,4,7,15,30");
        return;
      }

      const uniqueSorted = Array.from(new Set(values)).sort((a, b) => a - b);
      state.settings = { intervals: uniqueSorted };
      void persist();
      render();
    }

        .replaceAll("'", "&#39;");

    function renderAllWords() {
      const today = todayDate();
      const words = getFilteredWords();
      const cardsEl = document.getElementById("all-cards");
      const emptyEl = document.getElementById("all-empty");
      cardsEl.innerHTML = "";

      if (!words.length) {
        emptyEl.classList.remove("hidden");
        return;
      }

      emptyEl.classList.add("hidden");

      for (const word of words) {
        const lapseMeta = getLapseMeta(word.lapseCount || 0);
        const plan = [
          ...buildMainPlan(word.learnedDate, word.intervals || DEFAULT_INTERVALS).map((item) => ({
            ...item,
            done: (word.completedReviews || []).includes(item.step),
          })),
          ...(word.reinforcementRounds || []).flatMap((round) =>
            buildReinforcementPlan(round).map((item) => ({
              ...item,
              done: (round.completedSteps || []).includes(item.step),
            }))
          ),
        ].sort((a, b) => {
          if (a.reviewDate !== b.reviewDate) return a.reviewDate.localeCompare(b.reviewDate);
          if (a.source !== b.source) return a.source === "main" ? -1 : 1;
          return a.step - b.step;
        });

        const dueSteps = getAllDueSteps(word, today);
        const progress = getProgress(word);

        const planHtml = plan
          .map((item) => {
            const due = item.reviewDate <= today && !item.done;
            const statusClass = item.done ? "done" : due ? "due" : "future";
            const statusText = item.done ? "已完成" : due ? "待复习" : "未到期";

            return `
              <div class="plan-item">
                <span>${escapeHtml(item.label)} · 第 ${item.offset} 天 · ${escapeHtml(item.reviewDate)}</span>
                <span class="status ${statusClass}">${statusText}</span>
              </div>
            `;
          })
          .join("");

        const card = document.createElement("div");
        card.className = "card word-card";
        card.innerHTML = `
          <div class="word-header">
            <div>
              <div class="word-title">${escapeHtml(word.word)}</div>
              <div class="word-meta" style="margin-top:6px;">
                学习日期：${escapeHtml(word.learnedDate)}${word.meaning ? ` · ${escapeHtml(word.meaning)}` : ""}
              </div>
            </div>
            <div class="icon-btns">
              <button class="icon-btn" title="重置进度" onclick="window.__app.resetProgress('${word.id}')">重置</button>
              <button class="icon-btn" title="删除单词" onclick="window.__app.deleteWord('${word.id}')">删除</button>
            </div>
          </div>

          ${word.note ? `<div class="word-note">${escapeHtml(word.note)}</div>` : ""}
          ${word.lapseCount > 0 ? `<div class="lapse-text ${lapseMeta.textClass}">遗忘次数：${word.lapseCount}</div>` : ""}

          <div class="progress-wrap">
            <div class="progress-row">
              <span>复习进度</span>
              <span>${progress.done}/${progress.total}</span>
            </div>
            <div class="progress"><div class="progress-bar" style="width:${progress.percent}%;"></div></div>
          </div>

          <div class="plan-box" style="margin-top:14px;">
            <div style="font-size:14px; font-weight:700;">复习计划</div>
            ${planHtml}
          </div>

          ${dueSteps.length > 0 ? `<div class="footer-due" style="margin-top:14px;">当前待复习：${escapeHtml(dueSteps.map((s) => s.label).join("、"))}</div>` : ""}
        `;
        cardsEl.appendChild(card);
      }
    }

    function render() {
      renderTop();
      syncFormUI();
      renderToday();
      renderSession();
      renderAllWords();
      setTab(state.currentTab);
    }

    function bindEvents() {
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (isReviewRoute()) {
            navigateToAppTab(btn.dataset.tab);
            return;
          }
          setTab(btn.dataset.tab);
        });
      });

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;

        if (target.id === "btn-start-session" || target.id === "btn-reset-session" || target.id === "btn-session-restart" || target.id === "btn-session-rescan") {
          startReviewSession(true);
          return;
        }
        if (target.id === "btn-session-back" || target.id === "btn-session-exit") {
          navigateToAppTab("today");
          return;
        }
        if (target.id === "btn-session-reveal") {
          revealSessionMeaning();
          return;
        }
        if (target.id === "btn-session-known") {
          answerSessionKnown();
          return;
        }
        if (target.id === "btn-session-unknown") {
          answerSessionUnknown();
        }
      });

      document.getElementById("btn-logout").addEventListener("click", async () => {
        try {
          await apiRequest("/api/auth/logout", { method: "POST" });
        } catch {}
        handleAuthExpired();
      });
      document.getElementById("btn-export").addEventListener("click", exportData);
      document.getElementById("btn-settings").addEventListener("click", applyIntervalsByPrompt);
      document.getElementById("btn-lookup").addEventListener("click", handleLookupMeaning);
      document.getElementById("btn-add-word").addEventListener("click", addWord);

      document.getElementById("file-import").addEventListener("change", (e) => {
        importDataFromFile(e.target.files?.[0]);
        e.target.value = "";
      });

      document.getElementById("input-word").addEventListener("input", (e) => {
        const value = e.target.value;
        const previous = state.form.word;
        state.form.word = value;
        if (previous !== value) {
          state.form.meaning = "";
        }
        state.fetchError = "";
        syncFormUI();
      });

      document.getElementById("input-word").addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        e.preventDefault();
        if (!state.form.word.trim() || state.isFetchingMeaning) return;
        void addWord();
      });

      document.getElementById("input-note").addEventListener("input", (e) => {
        state.form.note = e.target.value;
      });

      document.getElementById("input-search").addEventListener("input", (e) => {
        state.query = e.target.value;
        renderAllWords();
      });

      document.getElementById("select-sort").addEventListener("change", (e) => {
        state.sortBy = e.target.value;
        renderAllWords();
      });
    }

    window.__app = {
      toggleReveal(wordId, value) {
        state.revealState[wordId] = value;
        renderToday();
      },
      markReviewDone(wordId, step, source, reinforcementId) {
        markReviewDone(wordId, step, source, reinforcementId);
      },
      markWordKnown(wordId) {
        markWordKnown(wordId);
      },
      markWordUnknown(wordId) {
        markWordUnknown(wordId);
      },
      markAllDueDone(wordId) {
        markAllDueDone(wordId);
      },
      resetProgress(wordId) {
        resetProgress(wordId);
      },
      deleteWord(wordId) {
        deleteWord(wordId);
      }
    };

    async function init() {
      runSelfChecks();
      const loggedIn = await loadCurrentUser();
      if (!loggedIn) return;
      await loadState();
      if (!state.currentUser) return;
      const initialTab = consumeInitialTab();
      if (isReviewRoute()) {
        state.currentTab = "session";
        state.reviewSession.queue = buildReviewSessionQueue();
        state.reviewSession.revealed = false;
      } else if (initialTab && ["today", "add", "all"].includes(initialTab)) {
        state.currentTab = initialTab;
      } else if (state.currentTab === "session") {
        state.currentTab = "today";
      }
      bindEvents();
      render();
      setInterval(() => {
        renderTop();
        renderToday();
        renderSession();
        renderAllWords();
      }, 1000);
    }

    init();
  </script>
</body>
</html>
